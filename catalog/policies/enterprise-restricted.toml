schema_version = "1.0"
id = "enterprise-restricted"
allow_packages = []
deny_packages = ["terraform"]
allow_categories = ["browsers", "editors", "developer-tools", "productivity", "security", "system-utilities"]
deny_categories = ["communication", "media"]
allow_sources = []
deny_sources = []
allow_backends = ["winget", "homebrew-formula", "homebrew-cask", "apt", "dnf", "pacman", "zypper", "apk"]
deny_backends = ["artifact", "flatpak", "snap", "scoop", "chocolatey"]
allow_channels = ["stable"]
deny_channels = ["beta", "nightly", "custom"]
allow_scopes = ["system", "auto"]
deny_scopes = ["user"]
allow_licenses = []
deny_licenses = ["BUSL-1.1", "LicenseRef-Proprietary"]
preferred_backends = ["winget", "apt", "dnf", "pacman", "zypper", "apk", "homebrew-formula", "homebrew-cask"]
require_signatures = true
require_digests = true
trusted_publishers = []
minimum_provenance = "backend-repository"
forbid_artifacts = true
forbid_prerelease = true
require_confirmation = true
require_dry_run = true
network_domains = []
prevent_downgrade = true
prevent_uninstall = true
freshness_days = 14
