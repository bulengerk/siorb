name: Native packaging

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "README.md"
      - "LICENSE"
      - "crates/siorb-cli/**"
      - "packaging/**"
      - "scripts/release/**"
      - ".github/workflows/packaging.yml"
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "README.md"
      - "LICENSE"
      - "crates/siorb-cli/**"
      - "packaging/**"
      - "scripts/release/**"
      - ".github/workflows/packaging.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: packaging-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  SOURCE_DATE_EPOCH: "0"

jobs:
  native-package:
    name: ${{ matrix.target }} package smoke
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            os: linux
            target: x86_64-unknown-linux-gnu
            binary: target/x86_64-unknown-linux-gnu/release/siorb
            package_arch: x86_64
          - runner: ubuntu-22.04-arm
            os: linux
            target: aarch64-unknown-linux-gnu
            binary: target/aarch64-unknown-linux-gnu/release/siorb
            package_arch: arm64
          - runner: windows-2022
            os: windows
            target: x86_64-pc-windows-msvc
            binary: target/x86_64-pc-windows-msvc/release/siorb.exe
            wix_arch: x64
          - runner: windows-11-arm
            os: windows
            target: aarch64-pc-windows-msvc
            binary: target/aarch64-pc-windows-msvc/release/siorb.exe
            wix_arch: arm64
          - runner: macos-15-intel
            os: macos
            target: x86_64-apple-darwin
            binary: target/x86_64-apple-darwin/release/siorb
          - runner: macos-15
            os: macos
            target: aarch64-apple-darwin
            binary: target/aarch64-apple-darwin/release/siorb
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install pinned Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component rustfmt,clippy
          rustup default 1.85.0
          rustup target add "${{ matrix.target }}"
      - name: Read workspace version
        id: version
        shell: bash
        run: |
          version=$(python -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["workspace"]["package"]["version"])')
          echo "version=$version" >>"$GITHUB_OUTPUT"
      - name: Build native CLI
        shell: bash
        run: cargo build --locked --release --target "${{ matrix.target }}" -p siorb-cli
      - name: Smoke-test native CLI
        shell: bash
        run: '"${{ matrix.binary }}" version'
      - name: Install RPM packaging tool
        if: matrix.os == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes rpm
      - name: Build and inspect DEB and RPM
        if: matrix.os == 'linux'
        shell: bash
        run: |
          scripts/release/package-linux.sh \
            "${{ matrix.binary }}" \
            "${{ steps.version.outputs.version }}" \
            "${{ matrix.package_arch }}" \
            all dist
          dpkg-deb --info dist/*.deb
          rpm -qpl dist/*.rpm
      - name: Build and inspect unsigned macOS package
        if: matrix.os == 'macos'
        shell: bash
        run: |
          pkg="dist/siorb-${{ steps.version.outputs.version }}-${{ matrix.target }}.pkg"
          scripts/release/package-macos.sh \
            "${{ matrix.binary }}" \
            "${{ steps.version.outputs.version }}" \
            "$pkg"
          pkgutil --payload-files "$pkg"
      - name: Install pinned WiX tool
        if: matrix.os == 'windows'
        shell: pwsh
        run: dotnet tool install --global wix --version 6.0.2
      - name: Parse release PowerShell hooks
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          Get-ChildItem -LiteralPath scripts/release -Filter *.ps1 | ForEach-Object {
            [void][scriptblock]::Create((Get-Content -LiteralPath $_.FullName -Raw))
          }
      - name: Build and inspect unsigned Windows MSI
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $msi = "dist/siorb-${{ steps.version.outputs.version }}-${{ matrix.target }}.msi"
          ./scripts/release/package-windows.ps1 `
            -Binary "${{ matrix.binary }}" `
            -Version "${{ steps.version.outputs.version }}" `
            -Architecture "${{ matrix.wix_arch }}" `
            -Output $msi
          Get-Item -LiteralPath $msi | Format-List Name,Length
      - name: Build and verify native archive
        shell: bash
        run: |
          python scripts/release/package_archive.py \
            --binary "${{ matrix.binary }}" \
            --target "${{ matrix.target }}" \
            --version "${{ steps.version.outputs.version }}" \
            --output-dir dist
          python scripts/release/checksums.py --directory dist --output dist/SHA256SUMS
          python scripts/release/verify_release.py \
            --directory dist --checksums dist/SHA256SUMS --inspect-archives
      - name: Upload unsigned package evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-${{ matrix.target }}-${{ github.sha }}-UNSIGNED
          path: dist
          if-no-files-found: error
          retention-days: 14
