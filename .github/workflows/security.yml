name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  dependency-review:
    # Dependabot's pull_request token is read-only and GitHub's dependency-review
    # API is unavailable until the repository owner enables Dependency graph.
    # Cargo audit and cargo-deny still run for every Dependabot update below.
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Review dependency changes
        uses: actions/dependency-review-action@3c4e3dcb1aa7874d2c16be7d79418e9b7efd6261 # v4.8.2
        with:
          fail-on-severity: high

  rust-policy:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install isolated audit tools
        run: |
          rustup toolchain install 1.88.0 --profile minimal
          cargo +1.88.0 install --locked cargo-audit --version 0.22.2
          cargo +1.88.0 install --locked cargo-deny --version 0.20.2
      - name: Audit Rust advisories
        run: |
          cargo audit --file Cargo.lock
          cargo audit --file tests/Cargo.lock
          cargo audit --file fuzz/Cargo.lock
      - name: Enforce dependency and license policy
        run: cargo deny check
      - name: Scan committed text for secret patterns
        run: python3 scripts/check_secrets.py

  codeql:
    # Dependabot updates only dependency metadata; analyze the merged main ref
    # instead of failing its read-only pull_request token on result upload.
    if: github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4.32.4
        with:
          languages: rust
          build-mode: none
      - name: Analyze
        uses: github/codeql-action/analyze@e34fc2711fb7964ca6850c8a8382121f34745f3b # v4.32.4
