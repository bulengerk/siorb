name: Disposable native mutation smoke

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-smoke-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Linux APT install, verify, and remove
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0
      - name: Build Siorb
        run: cargo build --locked --release -p siorb-cli
      - name: Exercise a real native transaction on the disposable runner
        env:
          SIORB_STATE_DIR: ${{ runner.temp }}/siorb-native-smoke
        run: |
          target/release/siorb --non-interactive --yes --accept-agreements --via apt --scope system install hyperfine
          target/release/siorb --non-interactive --via apt verify hyperfine
          target/release/siorb --non-interactive --yes --via apt remove hyperfine

  linux-yum:
    name: Rocky Linux Yum install, verify, and remove
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain and musl linker
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0
          rustup target add x86_64-unknown-linux-musl
          sudo apt-get update
          sudo apt-get install --yes musl-tools
      - name: Build portable Siorb
        run: cargo build --locked --release -p siorb-cli --target x86_64-unknown-linux-musl
      - name: Exercise a real Yum transaction in disposable Rocky Linux
        run: |
          docker run --rm --pull=always \
            --volume "$PWD/target/x86_64-unknown-linux-musl/release/siorb:/usr/local/bin/siorb:ro" \
            rockylinux/rockylinux:9.6@sha256:91bbb8eb52ca462611c1f9ce5c4cede4172a31bfe64f336e82f29648694a3cfe \
            bash -euo pipefail -c '
              export SIORB_STATE_DIR=/tmp/siorb-native-smoke
              siorb version
              siorb --offline --json search git
              siorb --offline --json info git
              siorb --non-interactive --accept-agreements --via yum --scope system --dry-run --explain install git
              siorb --non-interactive --yes --accept-agreements --via yum --scope system install git
              siorb --non-interactive --via yum verify git
              siorb --non-interactive --yes --via yum remove git
            '

  macos:
    name: macOS PKG and Homebrew end-to-end smoke
    runs-on: macos-15
    timeout-minutes: 35
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0
      - name: Build Siorb
        run: cargo build --locked --release -p siorb-cli
      - name: Package and install Siorb
        run: |
          version=$(cargo metadata --locked --no-deps --format-version 1 | python3 -c 'import json,sys; print(next(p["version"] for p in json.load(sys.stdin)["packages"] if p["name"] == "siorb-cli"))')
          pkg="$RUNNER_TEMP/siorb-smoke.pkg"
          test ! -e /usr/local/bin/siorb
          scripts/release/package-macos.sh target/release/siorb "$version" "$pkg"
          sudo installer -pkg "$pkg" -target /
          test -x /usr/local/bin/siorb
          touch "$RUNNER_TEMP/siorb-package-installed"
      - name: Exercise installed CLI discovery, planning, and a real transaction
        env:
          SIORB_STATE_DIR: ${{ runner.temp }}/siorb-native-smoke
        run: |
          siorb=/usr/local/bin/siorb
          "$siorb" version
          "$siorb" --offline --json search hyperfine
          "$siorb" --offline --json info hyperfine
          "$siorb" --non-interactive --accept-agreements --via homebrew-formula --scope user --dry-run --explain install hyperfine
          "$siorb" --non-interactive --yes --accept-agreements --via homebrew-formula --scope user install hyperfine
          "$siorb" --non-interactive --via homebrew-formula verify hyperfine
          "$siorb" --non-interactive --yes --via homebrew-formula remove hyperfine
      - name: Uninstall Siorb package
        if: always()
        run: |
          if [[ -f "$RUNNER_TEMP/siorb-package-installed" ]]; then
            sudo rm -f /usr/local/bin/siorb /usr/local/share/doc/siorb/LICENSE
            sudo rmdir /usr/local/share/doc/siorb 2>/dev/null || true
            sudo pkgutil --forget dev.siorb.cli || true
          fi

  windows:
    name: Windows x64 MSI and WinGet end-to-end smoke
    runs-on: windows-2025
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0
      - name: Bootstrap stable WinGet on the disposable runner
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Install-PSResource `
            -Name Microsoft.WinGet.Client `
            -Version 1.29.280 `
            -Repository PSGallery `
            -Scope CurrentUser `
            -TrustRepository `
            -Quiet
          Import-Module Microsoft.WinGet.Client -RequiredVersion 1.29.280
          Repair-WinGetPackageManager -AllUsers
          $appInstaller = Get-AppxPackage `
            -AllUsers `
            -Name Microsoft.DesktopAppInstaller |
            Sort-Object Version -Descending |
            Select-Object -First 1
          if (-not $appInstaller) { throw "WinGet repair did not register Microsoft.DesktopAppInstaller" }
          $wingetPath = Join-Path $appInstaller.InstallLocation "winget.exe"
          if (-not (Test-Path -LiteralPath $wingetPath -PathType Leaf)) {
            throw "WinGet repair did not install a native winget.exe"
          }
          $wingetDirectory = Split-Path -Parent $wingetPath
          $wingetDirectory | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & $wingetPath --version
      - name: Build Siorb
        run: cargo build --locked --release -p siorb-cli
      - name: Install pinned WiX tool
        shell: pwsh
        run: dotnet tool install --global wix --version 6.0.2
      - name: Package and install Siorb
        shell: pwsh
        run: |
          $metadata = cargo metadata --locked --no-deps --format-version 1 | ConvertFrom-Json
          $version = ($metadata.packages | Where-Object name -eq 'siorb-cli').version
          $msi = Join-Path $env:RUNNER_TEMP "siorb-smoke.msi"
          $log = Join-Path $env:RUNNER_TEMP "siorb-smoke-msi.log"
          $candidates = @($env:ProgramFiles, ${env:ProgramFiles(x86)}, $env:ProgramW6432) |
            Where-Object { $_ } |
            ForEach-Object { Join-Path $_ "Siorb\siorb.exe" } |
            Select-Object -Unique
          if ($candidates | Where-Object { Test-Path -LiteralPath $_ }) { throw "Disposable runner already contains Siorb" }
          ./scripts/release/package-windows.ps1 `
            -Binary "target/release/siorb.exe" `
            -Version $version `
            -Architecture x64 `
            -Output $msi
          $install = Start-Process msiexec.exe `
            -ArgumentList @('/i', $msi, '/qn', '/norestart', '/L*v', $log) `
            -Wait -PassThru
          if ($install.ExitCode -notin @(0, 3010)) { throw "MSI install failed with exit code $($install.ExitCode)" }
          New-Item -ItemType File -Path (Join-Path $env:RUNNER_TEMP "siorb-package-installed") | Out-Null
          $installed = $candidates | Where-Object { Test-Path -LiteralPath $_ -PathType Leaf } | Select-Object -First 1
          if (-not $installed) {
            Get-Content -LiteralPath $log -Tail 200
            throw "MSI did not install siorb.exe under a native Program Files directory"
          }
          "SIORB_SMOKE_EXE=$installed" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Exercise installed CLI discovery, planning, and a real transaction
        shell: pwsh
        env:
          SIORB_STATE_DIR: ${{ runner.temp }}\siorb-native-smoke
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          $siorb = $env:SIORB_SMOKE_EXE
          & $siorb version
          & $siorb --offline --json search hyperfine
          & $siorb --offline --json info hyperfine
          & $siorb --non-interactive --accept-agreements --via winget --scope user --dry-run --explain install hyperfine
          & $siorb --non-interactive --yes --accept-agreements --via winget --scope user install hyperfine
          & $siorb --non-interactive --via winget verify hyperfine
          & $siorb --non-interactive --yes --via winget remove hyperfine
      - name: Uninstall Siorb package
        if: always()
        shell: pwsh
        run: |
          $marker = Join-Path $env:RUNNER_TEMP "siorb-package-installed"
          $msi = Join-Path $env:RUNNER_TEMP "siorb-smoke.msi"
          if ((Test-Path -LiteralPath $marker) -and (Test-Path -LiteralPath $msi)) {
            $uninstall = Start-Process msiexec.exe `
              -ArgumentList @('/x', $msi, '/qn', '/norestart') `
              -Wait -PassThru
            if ($uninstall.ExitCode -notin @(0, 3010)) { throw "MSI uninstall failed with exit code $($uninstall.ExitCode)" }
          }
