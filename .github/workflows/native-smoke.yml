name: Disposable native mutation smoke

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-smoke-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Linux APT install, verify, and remove
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0
      - name: Build Siorb
        run: cargo build --locked --release -p siorb-cli
      - name: Exercise a real native transaction on the disposable runner
        env:
          SIORB_STATE_DIR: ${{ runner.temp }}/siorb-native-smoke
        run: |
          target/release/siorb --non-interactive --yes --accept-agreements --via apt --scope system install hyperfine
          target/release/siorb --non-interactive --via apt verify hyperfine
          target/release/siorb --non-interactive --yes --via apt remove hyperfine

  macos:
    name: macOS Homebrew install, verify, and remove
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0
      - name: Build Siorb
        run: cargo build --locked --release -p siorb-cli
      - name: Exercise a real native transaction on the disposable runner
        env:
          SIORB_STATE_DIR: ${{ runner.temp }}/siorb-native-smoke
        run: |
          target/release/siorb --non-interactive --yes --accept-agreements --via homebrew-formula --scope user install hyperfine
          target/release/siorb --non-interactive --via homebrew-formula verify hyperfine
          target/release/siorb --non-interactive --yes --via homebrew-formula remove hyperfine

  windows:
    name: Windows WinGet install, verify, and remove
    runs-on: windows-11-arm
    timeout-minutes: 35
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install pinned Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0
      - name: Build Siorb
        run: cargo build --locked --release -p siorb-cli
      - name: Exercise a real native transaction on the disposable runner
        shell: pwsh
        env:
          SIORB_STATE_DIR: ${{ runner.temp }}\siorb-native-smoke
        run: |
          target\release\siorb.exe --non-interactive --yes --accept-agreements --via winget --scope user install hyperfine
          target\release\siorb.exe --non-interactive --via winget verify hyperfine
          target\release\siorb.exe --non-interactive --yes --via winget remove hyperfine
